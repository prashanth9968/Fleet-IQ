name: fleetiq_api_client
description: Network client (Dio) for FleetIQ backend microservices with automatic header and token interceptors.
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.3.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  fleetiq_models:
    path: ../models
  fleetiq_shared:
    path: ../shared
