server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: fleetiq-auth-service
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fleetiq_dev}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgressecret}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Custom JWT Configuration parameters
app:
  jwt:
    # 512-bit HS512 signing secret (HMAC SHA) - change this in production!
    secret: ${JWT_SECRET:4z3W2q1p0o9n8m7l6k5j4i3h2g1f0e9d8c7b6a5y4x3w2u1t0s9r8q7p6o5n4m3l2k1j0}
    expiration-ms: 900000          # 15 minutes (900,000 ms)
    refresh-expiration-ms: 604800000 # 7 days (604,800,000 ms)

# OpenAPI Documentation configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Logging configuration (conforming to engineering standards)
logging:
  level:
    root: INFO
    com.fleetiq.auth: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [Tenant:%X{tenantId}] [Trace:%X{traceId}] - %msg%n"

# Micrometer Actuator Metrics Config
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
