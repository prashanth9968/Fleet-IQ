apiVersion: v1
kind: ConfigMap
metadata:
  name: fleetiq-config
data:
  SPRING_PROFILES_ACTIVE: "prod"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/fleetiq"
  SPRING_REDIS_HOST: "redis"
  SPRING_REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: fleetiq-secrets
type: Opaque
data:
  # Base64 encoded values
  SPRING_DATASOURCE_USERNAME: ZmxlZXRpcQ== # fleetiq
  SPRING_DATASOURCE_PASSWORD: ZmxlZXRpcQ== # fleetiq
