apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleetiq-auth-service
  labels:
    app: fleetiq-auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fleetiq-auth-service
  template:
    metadata:
      labels:
        app: fleetiq-auth-service
    spec:
      containers:
      - name: auth-service
        image: fleetiq/fleetiq-auth-service:latest
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: fleetiq-config
        - secretRef:
            name: fleetiq-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8081
          initialDelaySeconds: 40
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: fleetiq-auth-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP
