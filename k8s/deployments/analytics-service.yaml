apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleetiq-analytics-service
  labels:
    app: fleetiq-analytics-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fleetiq-analytics-service
  template:
    metadata:
      labels:
        app: fleetiq-analytics-service
    spec:
      containers:
      - name: analytics-service
        image: fleetiq/fleetiq-analytics-service:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: fleetiq-config
        - secretRef:
            name: fleetiq-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
spec:
  selector:
    app: fleetiq-analytics-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
