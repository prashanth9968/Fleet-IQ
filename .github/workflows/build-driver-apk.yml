name: Build Driver App APK

on:
  push:
    branches: [ master ]
    paths:
      - 'fleetiq_mobile/**'
  workflow_dispatch:

jobs:
  build-driver-apk:
    name: Build Driver APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Clear Gradle Cache (Avoid Corrupted SDK Artifacts)
        run: |
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/wrapper/

      - name: Get Shared Package Dependencies
        run: |
          for pkg in fleetiq_mobile/packages/*/; do
            echo "==> Getting dependencies for $pkg"
            cd "$GITHUB_WORKSPACE/$pkg"
            flutter pub get
            cd "$GITHUB_WORKSPACE"
          done

      - name: Generate Android Platform Files for Driver App
        run: |
          cd fleetiq_mobile/apps/driver
          flutter create --platforms=android --project-name driver_app . 2>/dev/null || true

      - name: Patch compileSdkVersion to 34 (supports sqlite3_flutter_libs 0.4.x)
        run: |
          APP_DIR="fleetiq_mobile/apps/driver/android/app"
          # Groovy DSL (build.gradle)
          if [ -f "$APP_DIR/build.gradle" ]; then
            echo "==> Patching Groovy build.gradle"
            sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/g' "$APP_DIR/build.gradle"
            sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/g' "$APP_DIR/build.gradle"
          fi
          # Kotlin DSL (build.gradle.kts)
          if [ -f "$APP_DIR/build.gradle.kts" ]; then
            echo "==> Patching Kotlin build.gradle.kts"
            sed -i 's/compileSdk = [0-9]*/compileSdk = 34/g' "$APP_DIR/build.gradle.kts"
            sed -i 's/targetSdk = [0-9]*/targetSdk = 34/g' "$APP_DIR/build.gradle.kts"
          fi
          echo "==> Final SDK settings:"
          grep -rE "compileSdk|targetSdk" "$APP_DIR/" || true

      - name: Get Driver App Dependencies
        run: |
          cd fleetiq_mobile/apps/driver
          flutter pub get

      - name: Run Drift Code Generation (build_runner)
        run: |
          cd fleetiq_mobile/apps/driver
          dart run build_runner build --delete-conflicting-outputs

      - name: Build Driver App APK (Release)
        run: |
          cd fleetiq_mobile/apps/driver
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Driver APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fleetiq-driver-app-release-${{ github.run_number }}
          path: fleetiq_mobile/apps/driver/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
