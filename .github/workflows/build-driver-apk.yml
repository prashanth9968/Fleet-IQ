name: Build Driver App APK

on:
  push:
    branches: [ master ]
    paths:
      - 'fleetiq_mobile/**'
  workflow_dispatch:

jobs:
  build-driver-apk:
    name: Build Driver APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Delete Corrupted Android SDK 35 and Reinstall Fresh
        run: |
          echo "Removing corrupted android-35 platform..."
          rm -rf $ANDROID_SDK_ROOT/platforms/android-35
          echo "Accepting all SDK licenses..."
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_SDK_ROOT > /dev/null 2>&1 || true
          echo "Installing fresh Android SDK 35 and Build Tools 35..."
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            --sdk_root=$ANDROID_SDK_ROOT
          echo "Verifying android.jar..."
          ls -lh $ANDROID_SDK_ROOT/platforms/android-35/android.jar

      - name: Get Shared Package Dependencies
        run: |
          for pkg in fleetiq_mobile/packages/*/; do
            echo "==> Getting dependencies for $pkg"
            cd "$GITHUB_WORKSPACE/$pkg"
            flutter pub get
            cd "$GITHUB_WORKSPACE"
          done

      - name: Generate Android Platform Files for Driver App
        run: |
          cd fleetiq_mobile/apps/driver
          flutter create --platforms=android --project-name driver_app . 2>/dev/null || true

      - name: Patch compileSdkVersion to 35 (Groovy + Kotlin DSL)
        run: |
          APP_DIR="fleetiq_mobile/apps/driver/android/app"
          # Handle Groovy DSL (build.gradle)
          if [ -f "$APP_DIR/build.gradle" ]; then
            echo "==> Patching Groovy build.gradle"
            sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 35/g' "$APP_DIR/build.gradle"
            sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 35/g' "$APP_DIR/build.gradle"
            cat "$APP_DIR/build.gradle"
          fi
          # Handle Kotlin DSL (build.gradle.kts)
          if [ -f "$APP_DIR/build.gradle.kts" ]; then
            echo "==> Patching Kotlin build.gradle.kts"
            sed -i 's/compileSdk = [0-9]*/compileSdk = 35/g' "$APP_DIR/build.gradle.kts"
            sed -i 's/targetSdk = [0-9]*/targetSdk = 35/g' "$APP_DIR/build.gradle.kts"
            cat "$APP_DIR/build.gradle.kts"
          fi

      - name: Get Driver App Dependencies
        run: |
          cd fleetiq_mobile/apps/driver
          flutter pub get

      - name: Run Drift Code Generation (build_runner)
        run: |
          cd fleetiq_mobile/apps/driver
          dart run build_runner build --delete-conflicting-outputs

      - name: Build Driver App APK (Release)
        run: |
          cd fleetiq_mobile/apps/driver
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Driver APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fleetiq-driver-app-release-${{ github.run_number }}
          path: fleetiq_mobile/apps/driver/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
