services:
  # -----------------------------------------------------
  # Core Infrastructure Services
  # -----------------------------------------------------
  - type: web
    name: fleetiq-auth-service
    env: docker
    dockerContext: fleetiq-auth-service
    dockerfilePath: fleetiq-auth-service/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false # User needs to enter the Neon Postgres URL in the dashboard
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

  - type: web
    name: fleetiq-vehicle-service
    env: docker
    dockerContext: fleetiq-vehicle-service
    dockerfilePath: fleetiq-vehicle-service/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false

  - type: web
    name: fleetiq-driver-service
    env: docker
    dockerContext: fleetiq-driver-service
    dockerfilePath: fleetiq-driver-service/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false

  - type: web
    name: fleetiq-tracking-service
    env: docker
    dockerContext: fleetiq-tracking-service
    dockerfilePath: fleetiq-tracking-service/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: KAFKA_BOOTSTRAP_SERVERS
        sync: false # User must provide Upstash Kafka URL
      - key: KAFKA_SASL_USERNAME
        sync: false # User must provide Upstash Kafka Username
      - key: KAFKA_SASL_PASSWORD
        sync: false # User must provide Upstash Kafka Password

  - type: web
    name: fleetiq-fuel-service
    env: docker
    dockerContext: fleetiq-fuel-service
    dockerfilePath: fleetiq-fuel-service/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false

  - type: web
    name: fleetiq-alerts-service
    env: docker
    dockerContext: fleetiq-alerts-service
    dockerfilePath: fleetiq-alerts-service/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false

  - type: web
    name: fleetiq-health-service
    env: docker
    dockerContext: fleetiq-health-service
    dockerfilePath: fleetiq-health-service/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false

  - type: web
    name: fleetiq-analytics-service
    env: docker
    dockerContext: fleetiq-analytics-service
    dockerfilePath: fleetiq-analytics-service/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false

  # -----------------------------------------------------
  # API Gateway (Unifies all the services)
  # -----------------------------------------------------
  - type: web
    name: fleetiq-api-gateway
    env: docker
    dockerContext: fleetiq-api-gateway
    dockerfilePath: fleetiq-api-gateway/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: AUTH_SERVICE_URL
        value: https://fleetiq-auth-service.onrender.com
      - key: VEHICLE_SERVICE_URL
        value: https://fleetiq-vehicle-service.onrender.com
      - key: DRIVER_SERVICE_URL
        value: https://fleetiq-driver-service.onrender.com
      - key: FUEL_SERVICE_URL
        value: https://fleetiq-fuel-service.onrender.com
      - key: ALERTS_SERVICE_URL
        value: https://fleetiq-alerts-service.onrender.com
      - key: HEALTH_SERVICE_URL
        value: https://fleetiq-health-service.onrender.com
      - key: ANALYTICS_SERVICE_URL
        value: https://fleetiq-analytics-service.onrender.com
