server:
  port: 8080

spring:
  application:
    name: fleetiq-api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: vehicle-service
          uri: ${VEHICLE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/vehicles/**, /api/devices/**, /api/vehicle-types/**
        - id: tracking-service
          uri: ${TRACKING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/tracking/**
        - id: fuel-service
          uri: ${FUEL_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/fuel/**
        - id: alerts-service
          uri: ${ALERTS_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/alerts/**, /api/geofences/**
        - id: driver-service
          uri: ${DRIVER_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/drivers/**, /api/driver-assignments/**, /api/driver-scores/**
        - id: health-service
          uri: ${HEALTH_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/health/**, /api/maintenance/**, /api/work-orders/**
        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/reports/**, /api/kpi/**

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
