server:
  port: 8085
spring:
  application:
    name: fleetiq-alerts-service
  datasource:
    url: jdbc:postgresql://localhost:5432/fleetiq
    username: fleetiq
    password: fleetiq
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  redis:
    url: rediss://default:gQAAAAAAATsFAAIgcDI3MWI0OWVmYTg0NjA0MTVkOTc0M2NiOGRhMzg1ZmRhMQ@verified-dodo-80645.upstash.io:6379
logging:
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [Tenant:%X{tenantId}] [Trace:%X{traceId}] - %msg%n'
